<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Applied Agentic Integration - Centric Consulting</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: Arial, sans-serif;
    background: #232F3E;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    background: #FFFFFF;
    border-radius: 16px;
    max-width: 380px;
    width: 90%;
    padding: 40px 30px;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }
  .logo { height: 28px; margin-bottom: 24px; opacity: 0.7; }
  .icon {
    width: 56px;
    height: 56px;
    border-radius: 14px;
    background: #412C5D20;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
    font-size: 26px;
  }
  .title {
    font-size: 20px;
    font-weight: 700;
    color: #232F3E;
    margin-bottom: 8px;
    line-height: 1.3;
  }
  .subtitle {
    font-size: 13px;
    color: #676869;
    margin-bottom: 28px;
    line-height: 1.5;
  }
  .dl-btn {
    display: inline-block;
    background: #412C5D;
    color: #FFFFFF;
    font-size: 16px;
    font-weight: 700;
    padding: 14px 36px;
    border-radius: 10px;
    text-decoration: none;
    letter-spacing: 0.5px;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 12px #412C5D40;
  }
  .dl-btn:active {
    transform: scale(0.97);
  }
  .footer-text {
    margin-top: 24px;
    font-size: 10px;
    color: #676869;
    letter-spacing: 0.5px;
  }
  .accent-bar {
    height: 3px;
    width: 50px;
    background: #412C5D;
    margin: 0 auto 24px;
    border-radius: 2px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="accent-bar"></div>
  <div class="icon">&#x1F916;</div>
  <div class="title">Applied Agentic Integration</div>
  <div class="subtitle">One-pager overview of our AI agent strategy and deployment services</div>
  <a class="dl-btn" href="../pdfs/aai.pdf" download>Download PDF</a>
  <div class="footer-text">Centric Consulting | centricconsulting.com</div>
</div>
</body>
</html>
